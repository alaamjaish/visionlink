<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VisionLink — Command Center</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111820;
      --panel-2: #0f1520;
      --border: #1e2a3a;
      --text: #e6edf3;
      --muted: #8a97a6;
      --accent: #4ea8ff;
      --good: #3cd39f;
      --bad: #ff5a6a;
      --warn: #ffc857;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(90deg, #0f1724, #0b0f14);
    }
    header h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }
    header h1 span { color: var(--accent); }
    header .model {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
    }
    main {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 20px 32px 32px;
      max-width: 1400px; margin: 0 auto;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .panel h2 {
      margin: 0 0 12px 0;
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    .controls { grid-column: 1 / -1; }
    .btn-row {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    button {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.08s, background 0.15s, border-color 0.15s;
    }
    button:hover:not(:disabled) {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #041321; border-color: var(--accent); }
    .btn-danger { background: var(--bad); color: #1a0408; border-color: var(--bad); }
    .btn-ghost { background: transparent; }

    .mode-row {
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    }
    .mode-opt {
      font-size: 13px; color: var(--text);
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .mode-opt input { accent-color: var(--accent); }
    .mode-opt .hint { color: var(--muted); font-size: 11px; }
    .lights {
      display: flex; gap: 24px; flex-wrap: wrap;
      margin-top: 12px;
      align-items: center;
    }
    .light {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #555; box-shadow: 0 0 0 0 transparent;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .dot.on  { background: var(--good); box-shadow: 0 0 10px var(--good); }
    .dot.bad { background: var(--bad);  box-shadow: 0 0 10px var(--bad); }

    .transcript {
      min-height: 280px;
      max-height: 420px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13.5px;
      line-height: 1.55;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .msg { margin-bottom: 6px; white-space: pre-wrap; }
    .msg .who {
      font-weight: 600;
      margin-right: 8px;
      display: inline-block;
      min-width: 64px;
    }
    .msg.user   .who { color: var(--warn); }
    .msg.gemini .who { color: var(--accent); }
    .msg.system .who { color: var(--muted); }

    .photo-wrap {
      position: relative;
      min-height: 280px;
      display: flex; align-items: center; justify-content: center;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .photo-wrap img {
      max-width: 100%; max-height: 420px; display: block;
    }
    .photo-wrap .empty {
      color: var(--muted); font-size: 13px;
    }

    .log {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
      max-height: 180px;
      overflow-y: auto;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .log .line { margin-bottom: 3px; white-space: pre-wrap; }
    .log .line.error { color: var(--bad); }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>VISION<span>LINK</span> &middot; COMMAND CENTER</h1>
    <div class="model" id="modelTag">gemini-3.1-flash-live-preview</div>
  </header>

  <main>
    <section class="panel controls">
      <h2>Controls</h2>
      <div class="mode-row" style="margin-bottom:12px;">
        <span style="font-size:12px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-right:12px;">MODE</span>
        <label class="mode-opt"><input type="radio" name="mode" value="audio" checked> Audio only <span class="hint">(15 min cap)</span></label>
        <label class="mode-opt"><input type="radio" name="mode" value="snap"> Audio + Snap <span class="hint">(send one photo on demand)</span></label>
        <label class="mode-opt"><input type="radio" name="mode" value="video"> Audio + Live Video <span class="hint">(1 fps, 2 min cap)</span></label>
      </div>
      <div class="btn-row">
        <button id="btnStart" class="btn-primary">START LIVE</button>
        <button id="btnStop"  class="btn-danger"  disabled>STOP</button>
        <button id="btnSnap"  class="btn-ghost"   disabled>SNAP TO GEMINI</button>
        <button id="btnPhoto" class="btn-ghost">TAKE PHOTO</button>
        <button id="btnClear" class="btn-ghost">CLEAR TRANSCRIPT</button>
      </div>
      <div class="lights">
        <div class="light"><span class="dot" id="dotWs"></span>   WebSocket</div>
        <div class="light"><span class="dot" id="dotLive"></span> Gemini Live</div>
        <div class="light"><span class="dot" id="dotTurn"></span> Turn</div>
        <div class="light"><span class="dot" id="dotVideo"></span> Video streaming</div>
        <div class="light" id="modeLabel" style="margin-left:auto;">mode: audio</div>
      </div>
    </section>

    <section class="panel">
      <h2>Live Transcript</h2>
      <div class="transcript" id="transcript">
        <div class="msg system"><span class="who">system</span>Waiting for session...</div>
      </div>
    </section>

    <section class="panel">
      <h2>Camera <span id="frameCount" style="color:var(--muted);font-size:11px;font-weight:400;margin-left:8px;"></span></h2>
      <div class="photo-wrap" id="photoWrap">
        <div class="empty">No photo yet — click <b>TAKE PHOTO</b> or start a Live session in Snap/Video mode.</div>
      </div>
    </section>

    <section class="panel" style="grid-column: 1 / -1;">
      <h2>Log</h2>
      <div class="log" id="log"></div>
    </section>
  </main>

  <script>
    const qs = (id) => document.getElementById(id);
    const btnStart = qs('btnStart');
    const btnStop  = qs('btnStop');
    const btnSnap  = qs('btnSnap');
    const btnPhoto = qs('btnPhoto');
    const btnClear = qs('btnClear');
    const dotWs    = qs('dotWs');
    const dotLive  = qs('dotLive');
    const dotTurn  = qs('dotTurn');
    const dotVideo = qs('dotVideo');
    const modeLabel = qs('modeLabel');
    const frameCountEl = qs('frameCount');
    const transcript = qs('transcript');
    const photoWrap  = qs('photoWrap');
    const logBox   = qs('log');
    let currentMode = 'audio';
    let frameCount = 0;

    let currentTurn = { user: '', gemini: '' };
    let currentNodes = { user: null, gemini: null };

    function appendMsg(role, text, kind = role) {
      const div = document.createElement('div');
      div.className = `msg ${kind}`;
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = role === 'user' ? 'you'
                      : role === 'gemini' ? 'gemini'
                      : 'system';
      div.appendChild(who);
      const body = document.createElement('span');
      body.textContent = text;
      div.appendChild(body);
      transcript.appendChild(div);
      transcript.scrollTop = transcript.scrollHeight;
      return { el: div, body };
    }

    function appendLog(level, msg) {
      const line = document.createElement('div');
      line.className = `line ${level}`;
      const t = new Date().toLocaleTimeString();
      line.textContent = `[${t}] ${msg}`;
      logBox.appendChild(line);
      logBox.scrollTop = logBox.scrollHeight;
      while (logBox.childNodes.length > 200) logBox.removeChild(logBox.firstChild);
    }

    function setLive(on, mode) {
      dotLive.classList.toggle('on', !!on);
      btnStart.disabled = !!on;
      btnStop.disabled  = !on;
      if (mode) {
        currentMode = mode;
        modeLabel.textContent = 'mode: ' + mode;
      }
      // SNAP button is enabled only in snap/video modes during an active session
      btnSnap.disabled = !(on && (currentMode === 'snap' || currentMode === 'video'));
      dotVideo.classList.toggle('on', !!on && currentMode === 'video');
      // Disable mode selector while live
      document.querySelectorAll('input[name="mode"]').forEach(el => el.disabled = !!on);
      if (!on) { frameCount = 0; frameCountEl.textContent = ''; }
    }

    function flashTurn() {
      dotTurn.classList.add('on');
      setTimeout(() => dotTurn.classList.remove('on'), 600);
    }

    function onTranscript(role, text) {
      // Accumulate chunks in one line per role per turn
      if (!currentNodes[role]) {
        currentNodes[role] = appendMsg(role, '', role);
        currentTurn[role] = '';
      }
      currentTurn[role] += text;
      currentNodes[role].body.textContent = currentTurn[role];
      transcript.scrollTop = transcript.scrollHeight;
    }

    function endTurn() {
      currentTurn = { user: '', gemini: '' };
      currentNodes = { user: null, gemini: null };
      flashTurn();
    }

    function setPhoto(url) {
      photoWrap.innerHTML = '';
      const img = document.createElement('img');
      img.src = url + '?t=' + Date.now();
      photoWrap.appendChild(img);
    }

    // WebSocket
    let ws;
    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onopen = () => { dotWs.classList.add('on'); appendLog('info', 'WebSocket connected'); };
      ws.onclose = () => {
        dotWs.classList.remove('on');
        appendLog('error', 'WebSocket closed — retrying in 2s...');
        setTimeout(connectWs, 2000);
      };
      ws.onerror = () => dotWs.classList.add('bad');
      ws.onmessage = (ev) => {
        let data; try { data = JSON.parse(ev.data); } catch { return; }
        switch (data.type) {
          case 'state':
            setLive(data.live_connected, data.mode);
            if (data.latest_photo) setPhoto(data.latest_photo);
            if (data.model) qs('modelTag').textContent = data.model;
            break;
          case 'log':
            appendLog(data.level || 'info', data.msg);
            break;
          case 'live_state':
            setLive(data.connected, data.mode || currentMode);
            break;
          case 'transcript':
            onTranscript(data.role, data.text);
            break;
          case 'turn_complete':
            endTurn();
            break;
          case 'interrupted':
            appendLog('info', 'User interrupted Gemini — flushed queued audio');
            endTurn();
            break;
          case 'frame_sent':
            frameCount = data.n > 0 ? data.n : (frameCount + 1);
            frameCountEl.textContent = `(${frameCount} frame${frameCount===1?'':'s'} sent to Gemini)`;
            // Refresh live preview
            setPhoto('/api/live/frame');
            break;
          case 'photo':
            setPhoto(data.url);
            break;
        }
      };
    }
    connectWs();

    async function post(url) {
      try {
        const r = await fetch(url, { method: 'POST' });
        return await r.json();
      } catch (e) {
        appendLog('error', `${url} failed: ${e.message}`);
        return null;
      }
    }

    btnStart.addEventListener('click', async () => {
      btnStart.disabled = true;
      const mode = document.querySelector('input[name="mode"]:checked').value;
      currentMode = mode;
      appendLog('info', `Starting Gemini Live (mode: ${mode})...`);
      await post('/api/live/start?mode=' + encodeURIComponent(mode));
    });

    btnStop.addEventListener('click', async () => {
      btnStop.disabled = true;
      appendLog('info', 'Stopping Gemini Live...');
      await post('/api/live/stop');
    });

    btnSnap.addEventListener('click', async () => {
      btnSnap.disabled = true;
      appendLog('info', 'Sending snap to Gemini...');
      const r = await post('/api/live/snap');
      if (r && r.error) appendLog('error', 'Snap: ' + r.error);
      setTimeout(() => { if (currentMode !== 'audio') btnSnap.disabled = false; }, 300);
    });

    btnPhoto.addEventListener('click', async () => {
      btnPhoto.disabled = true;
      appendLog('info', 'Capturing photo...');
      await post('/api/photo');
      btnPhoto.disabled = false;
    });

    btnClear.addEventListener('click', () => {
      transcript.innerHTML = '';
      currentTurn = { user: '', gemini: '' };
      currentNodes = { user: null, gemini: null };
    });
  </script>
</body>
</html>
