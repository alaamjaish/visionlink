<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="vlGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#f5c95b"/>
    </linearGradient>
    <radialGradient id="vlCore" cx="32" cy="32" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer ring (lens) -->
  <circle cx="32" cy="32" r="27" stroke="url(#vlGrad)" stroke-width="3" fill="none"/>
  <!-- Inner ring (iris) -->
  <circle cx="32" cy="32" r="17" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.55"/>
  <!-- Pupil / link node -->
  <circle cx="32" cy="32" r="7.5" fill="url(#vlCore)"/>
  <circle cx="32" cy="32" r="3.5" fill="#f5c95b"/>
  <!-- Connection ticks (signal) -->
  <g stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round" opacity="0.85">
    <line x1="32" y1="3" x2="32" y2="9"/>
    <line x1="32" y1="55" x2="32" y2="61"/>
    <line x1="3" y1="32" x2="9" y2="32"/>
    <line x1="55" y1="32" x2="61" y2="32"/>
  </g>
</svg>
